name: Sonar analysis

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Python sources from template files
        shell: bash
        run: |
          set -euo pipefail

          scan_root="__sonar_python_source"
          rm -rf "$scan_root"
          mkdir -p "$scan_root"

          while IFS= read -r -d '' file; do
            target="$scan_root/${file#./}"
            target="${target%-tpl}"
            mkdir -p "$(dirname "$target")"
            cp "$file" "$target"
          done < <(find . \
            -path './.git' -prune -o \
            -path "./$scan_root" -prune -o \
            -name '*.py-tpl' -type f -print0)

          if ! find "$scan_root" -name '*.py' -type f | grep -q .; then
            echo "No Python template files were found."
            exit 1
          fi

          find "$scan_root" -name '*.py' -type f -print

      - name: Install PySonar
        run: |
          python -m pip install --upgrade pip
          python -m pip install pysonar

      - name: Run PySonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          pysonar \
            --sonar-token="$SONAR_TOKEN" \
            --sonar-project-key=research-projects-all_django-project-template \
            --sonar-organization=research-projects-all \
            --sonar-python-version=3.11 \
            -Dsonar.sources=__sonar_python_source
